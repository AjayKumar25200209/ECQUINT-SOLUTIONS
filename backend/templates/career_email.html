<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Career Application</title>
</head>

<body style="margin:0; padding:0; background:#f5f7fa; font-family:Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="padding:20px;">
    <tr>
      <td align="center">

        <!-- MAIN CONTAINER -->
        <table width="100%" cellpadding="0" cellspacing="0"
          style="max-width:800px; background:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 6px 24px rgba(0,0,0,0.06);">

          <!-- HEADER -->
          <tr>
            <td style="background:#e4332d; padding:24px; color:#ffffff;">
              <h2 style="margin:0; font-size:22px;">New Career Application</h2>
              <p style="margin:6px 0 0; font-size:13px; opacity:0.9;">
                A candidate has applied through your website
              </p>
            </td>
          </tr>

          <!-- CONTENT -->
          <tr>
            <td style="padding:24px;">

              <!-- INFO GRID -->
              <table width="100%" cellpadding="0" cellspacing="0">

                <tr>
                  <td style="padding:10px 0; color:#888; font-size:13px;">Full Name</td>
                  <td style="padding:10px 0; text-align:right; font-weight:600;">{{name}}</td>
                </tr>

                <tr>
                  <td style="padding:10px 0; color:#888;">Email</td>
                  <td style="padding:10px 0; text-align:right; font-weight:600;">{{email}}</td>
                </tr>

                <tr>
                  <td style="padding:10px 0; color:#888;">Phone</td>
                  <td style="padding:10px 0; text-align:right; font-weight:600;">{{phone}}</td>
                </tr>

                <tr>
                  <td style="padding:10px 0; color:#888;">Role</td>
                  <td style="padding:10px 0; text-align:right; font-weight:600;">{{role}}</td>
                </tr>

                <tr>
                  <td style="padding:10px 0; color:#888;">Experience</td>
                  <td style="padding:10px 0; text-align:right; font-weight:600;">{{experience}}</td>
                </tr>

                <tr>
                  <td style="padding:10px 0; color:#888;">Skills</td>
                  <td style="padding:10px 0; text-align:right; font-weight:600;">{{skills}}</td>
                </tr>

              </table>

              <!-- MESSAGE -->
              <div style="margin-top:20px;">
                <p style="font-size:13px; color:#888; margin-bottom:6px;">Message</p>
                <div style="background:#f7f7f7; padding:14px; border-radius:8px; font-size:14px; color:#333;">
                  {{message}}
                </div>
              </div>

              <!-- DOWNLOAD BUTTON -->
              <div style="margin-top:24px; text-align:center;">
                <a href="{{resume_url}}"
                   style="display:inline-block; padding:12px 20px; background:#e4332d; color:#ffffff; text-decoration:none; border-radius:6px; font-size:14px; font-weight:600;">
                  Download Resume
                </a>
              </div>

            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="padding:16px 24px; background:#fafafa; font-size:12px; color:#999;">
              This email was generated automatically from your career form.
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
