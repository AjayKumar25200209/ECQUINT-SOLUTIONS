<!-- templates/contact_email.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>New Inquiry</title>
</head>

<body style="margin:0; padding:0; background:#f5f7fa; font-family:Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="padding:20px;">
    <tr>
      <td align="center">

        <!-- CONTAINER -->
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.05);">

          <!-- HEADER -->
          <tr>
            <td style="background:#e4332d; padding:20px; color:#ffffff;">
              <h2 style="margin:0; font-size:20px;">New Contact Inquiry</h2>
              <p style="margin:5px 0 0; font-size:13px; opacity:0.9;">
                A new request has been submitted from your website
              </p>
            </td>
          </tr>

          <!-- BODY -->
          <tr>
            <td style="padding:20px;">

              <!-- USER INFO -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:20px;">
                
                <tr>
                  <td style="font-size:13px; color:#888;">Full Name</td>
                  <td style="font-size:14px; font-weight:600; text-align:right;">{{name}}</td>
                </tr>

                <tr>
                  <td style="font-size:13px; color:#888; padding-top:10px;">Email</td>
                  <td style="font-size:14px; font-weight:600; text-align:right; padding-top:10px;">{{email}}</td>
                </tr>

                <tr>
                  <td style="font-size:13px; color:#888; padding-top:10px;">Phone</td>
                  <td style="font-size:14px; font-weight:600; text-align:right; padding-top:10px;">{{phone}}</td>
                </tr>

                <tr>
                  <td style="font-size:13px; color:#888; padding-top:10px;">Company</td>
                  <td style="font-size:14px; font-weight:600; text-align:right; padding-top:10px;">{{company}}</td>
                </tr>

              </table>

              <!-- MESSAGE -->
              <div style="margin-top:10px;">
                <p style="font-size:13px; color:#888; margin-bottom:6px;">Message</p>

                <div style="background:#f7f7f7; padding:15px; border-radius:8px; font-size:14px; color:#333; line-height:1.6;">
                  {{message}}
                </div>
              </div>

            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="padding:15px 20px; background:#fafafa; font-size:12px; color:#999;">
              This email was generated automatically from your website contact form.
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
